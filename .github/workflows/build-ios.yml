name: Build iOS IPA

# The default "unsigned" build needs NO repository secrets: sideloading tools
# (AltStore, Sideloadly, ESign, Feather, ...) re-sign the IPA with your own
# certificate at install time, so a CI signature would be thrown away anyway.
#
# The signed methods (ad-hoc / development / app-store) additionally require
# these repository secrets:
#   APPLE_TEAM_ID                     — your 10-char team id (developer.apple.com > Membership)
#   IOS_DIST_CERT_P12_BASE64          — signing certificate + key as base64 .p12
#   IOS_DIST_CERT_PASSWORD            — password of that .p12
#   IOS_PROVISIONING_PROFILE_BASE64   — provisioning profile for com.hanne.jellyfinner (base64)
# The profile type must match the export method (Ad Hoc profile for ad-hoc, etc.).

on:
  workflow_dispatch:
    inputs:
      method:
        description: Export method
        type: choice
        default: unsigned
        options:
          - unsigned
          - ad-hoc
          - development
          - app-store
  push:
    tags: ['v*']

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      EXPORT_METHOD: ${{ inputs.method || 'unsigned' }}
    steps:
      - uses: actions/checkout@v4

      # GitHub's macOS runners ship several Xcode versions side by side; the
      # one selected by default can lag behind what Expo's SPM-based build
      # steps (e.g. ExpoModulesJSI) require. Always pick the newest available.
      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        run: pod install --project-directory=ios

      # ---------- unsigned (default, no secrets) ----------

      - name: Build unsigned
        if: env.EXPORT_METHOD == 'unsigned'
        run: |
          xcodebuild -workspace ios/Jellyfinner.xcworkspace \
            -scheme Jellyfinner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/derived \
            build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        if: env.EXPORT_METHOD == 'unsigned'
        run: |
          mkdir -p build/ipa Payload
          cp -R build/derived/Build/Products/Release-iphoneos/Jellyfinner.app Payload/
          zip -qry build/ipa/Jellyfinner-unsigned.ipa Payload

      # ---------- signed (needs the secrets documented above) ----------

      - name: Import signing certificate
        if: env.EXPORT_METHOD != 'unsigned'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        if: env.EXPORT_METHOD != 'unsigned'
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -o - -)
          NAME=$(security cms -D -i profile.mobileprovision | plutil -extract Name raw -o - -)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "PROFILE_NAME=$NAME" >> "$GITHUB_ENV"

      - name: Archive
        if: env.EXPORT_METHOD != 'unsigned'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Apple Distribution"
          if [ "$EXPORT_METHOD" = "development" ]; then IDENTITY="Apple Development"; fi
          xcodebuild -workspace ios/Jellyfinner.xcworkspace \
            -scheme Jellyfinner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Jellyfinner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        if: env.EXPORT_METHOD != 'unsigned'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Xcode 16 renamed the classic export methods.
          case "$EXPORT_METHOD" in
            ad-hoc) METHOD=release-testing ;;
            development) METHOD=debugging ;;
            app-store) METHOD=app-store-connect ;;
            *) METHOD="$EXPORT_METHOD" ;;
          esac
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${METHOD}</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.hanne.jellyfinner</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/Jellyfinner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist

      # ---------- publish ----------

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfinner-ipa
          path: build/ipa/*.ipa
          if-no-files-found: error

      - name: Attach IPA to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ipa/*.ipa
